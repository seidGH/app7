name: App7 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app7 code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image (app7)
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/app7 .

      - name: Push Docker image (app7)
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app7
