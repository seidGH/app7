version: "3.9"

services:
  web:
    build: .
    ports:
      - "1000:3000"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app7db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app7db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
